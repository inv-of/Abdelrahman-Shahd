<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Abdelrahman & Shahd Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Cinzel', serif;
  overflow:hidden;
}

/* 🌸 Blurred romantic background */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("background.jpg") center/cover no-repeat;
  filter:blur(1px) brightness(1.1);
  transform:scale(1.1);
  z-index:-2;
}

body::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center,
    rgba(255,255,255,0.35),
    rgba(255,255,255,0.15),
    rgba(0,0,0,0.2)
  );
  z-index:-1;
}

/* container */
.container{
  text-align:center;
  transform:translateY(60px);
  position:relative;
}

/* ✨ glow ring like image */
.glow-ring{
  position:absolute;
  inset:-40px;
  border-radius:40px;
  background:radial-gradient(circle,
    rgba(255,255,255,0.5),
    rgba(255,255,255,0.15),
    transparent 70%
  );
  filter:blur(10px);
  animation:pulse 3s infinite alternate;
  z-index:-1;
}

/* envelope */
.envelope-wrapper{
  width:210px;
  height:135px;
  position:relative;
  cursor:pointer;
  filter:drop-shadow(0 18px 25px rgba(0,0,0,0.2));
  transition:0.4s;
}

.envelope-wrapper:hover{
  transform:translateY(-5px) scale(1.03);
}

/* base */
.base{
  position:absolute;
  inset:0;
  background:linear-gradient(145deg,#fff1dd,#e6c9a3);
  border-radius:16px;
}

/* sides */
.left,.right,.bottom,.flap{
  position:absolute;
  width:100%;
  height:100%;
}

/* left */
.left{
  background:linear-gradient(135deg,#f0dcc2,#d8b990);
  clip-path:polygon(0 0,50% 50%,0 100%);
}

/* right */
.right{
  background:linear-gradient(225deg,#e8cfad,#d0ae86);
  clip-path:polygon(100% 0,50% 50%,100% 100%);
}

/* bottom */
.bottom{
  background:linear-gradient(to top,#ecd7bc,#fff1de);
  clip-path:polygon(0 100%,50% 45%,100% 100%);
}

/* 🔥 smaller flap (fixed) */
.flap{
  background:linear-gradient(to bottom,#f5e7d3,#dfc39d);

  /* أصغر وأنعم زي الصورة */
  clip-path:polygon(0 0,50% 65%,100% 0);

  transform-origin:top;
  transition:0.9s cubic-bezier(.4,.2,.2,1);
  z-index:5;
}

.open .flap{
  transform:rotateX(180deg);
}

/* pearl seal (outside feel) */
.pearl{
  position:absolute;
  top:52px;
  left:50%;
  transform:translateX(-50%);
  width:14px;
  height:14px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#fff,#d8c3a5);
  box-shadow:0 0 12px rgba(255,255,255,0.8);
  z-index:6;
}

/* ✨ sentence on envelope */
.envelope-text{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  letter-spacing:1.5px;
  color:#7a5437;
  font-weight:600;
  z-index:7;
  width:100%;
  text-align:center;
  pointer-events:none;
}

/* text */
.open-text{
  margin-top:22px;
  color:#5c3f2a;
  font-size:15px;
  letter-spacing:2px;
  font-weight:700;
}

/* animation */
@keyframes pulse{
  from{transform:scale(1); opacity:0.5;}
  to{transform:scale(1.08); opacity:0.9;}
}

</style>
</head>

<body>

<div class="container">

  <div class="envelope-wrapper" id="envelope">

    <div class="glow-ring"></div>

    <div class="base"></div>
    <div class="left"></div>
    <div class="right"></div>
    <div class="bottom"></div>
    <div class="flap"></div>

    <div class="pearl"></div>

    <div class="envelope-text">
      Open The Invitation
    </div>

  </div>


</div>

<script>
document.addEventListener("click", () => {
  localStorage.setItem("startMusic", "true");
}, { once: true });
</script>

<script>
const envelope = document.getElementById("envelope");

envelope.addEventListener("click", () => {
  envelope.classList.add("open");

  setTimeout(() => {
    window.location.href = "main.html";
  }, 1200);
});
</script>

</body>
</html>
